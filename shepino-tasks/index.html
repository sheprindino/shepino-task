<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080B16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Shepino Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#7C5CFC;--pl:#9B7FFF;--pd:#6347D9;--p2:#5B8DEF;--a:#F472B6;--bg:#080B16;--glass:rgba(15,20,45,.55);--glass2:rgba(20,28,60,.4);--glass3:rgba(25,35,70,.3);--t1:#F1F5F9;--t2:#94A3B8;--t3:#64748B;--t4:#475569;--b:rgba(148,163,184,.08);--bl:rgba(148,163,184,.12);--ok:#34D399;--w:#FBBF24;--err:#FB7185;--info:#60A5FA;--r:14px;--f:'Plus Jakarta Sans',system-ui,sans-serif;--blur:saturate(180%) blur(20px)}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(124,92,252,.25);border-radius:4px}
::selection{background:rgba(124,92,252,.3)}
input,select,textarea,button{font-family:var(--f);outline:none}
#app{height:100vh;position:relative;overflow:hidden}

/* BG */
.bgS{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bgG{position:absolute;inset:0;background-image:linear-gradient(rgba(148,163,184,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.03) 1px,transparent 1px);background-size:60px 60px}
.bgB{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:bM 20s ease-in-out infinite}
.b1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,92,252,.4),transparent 70%);top:-10%;left:-5%}
.b2{width:400px;height:400px;background:radial-gradient(circle,rgba(91,141,239,.35),transparent 70%);bottom:-8%;right:-3%;animation-delay:-7s}
.b3{width:350px;height:350px;background:radial-gradient(circle,rgba(244,114,182,.25),transparent 70%);top:40%;left:50%;animation-delay:-14s}
@keyframes bM{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-40px) scale(1.05)}50%{transform:translate(-20px,30px) scale(.95)}75%{transform:translate(40px,20px) scale(1.02)}}
.bgP{position:absolute;width:3px;height:3px;background:rgba(155,127,255,.5);border-radius:50%;animation:pF linear infinite}
@keyframes pF{0%{transform:translateY(100vh);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh);opacity:0}}
.bgE{position:absolute;border:1px solid rgba(124,92,252,.07);animation:gS 30s linear infinite}
.e1{width:80px;height:80px;top:15%;right:10%;border-radius:16px;transform:rotate(45deg)}
.e2{width:50px;height:50px;bottom:20%;left:8%;border-radius:50%}
@keyframes gS{to{transform:rotate(405deg)}}

/* LAYOUT */
.app-l{display:flex;height:100vh;position:relative;z-index:1}

/* SIDEBAR */
.sb{width:256px;min-width:256px;background:rgba(10,14,30,.75);backdrop-filter:var(--blur);border-right:1px solid var(--b);display:flex;flex-direction:column;transition:all .4s cubic-bezier(.4,0,.2,1);z-index:100}
.sb-hd{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--b)}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;flex-shrink:0;box-shadow:0 4px 20px rgba(124,92,252,.3);transition:transform .3s;cursor:pointer}
.logo:hover{transform:rotate(-5deg) scale(1.05)}
.brand{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--pl),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:12px;overflow-y:auto}
.sb-sec{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t4);padding:18px 12px 8px}
.si{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;color:var(--t2);cursor:pointer;font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .25s;position:relative}
.si::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:0;background:linear-gradient(180deg,var(--p),var(--p2));border-radius:0 3px 3px 0;transition:height .3s}
.si:hover{background:rgba(124,92,252,.06);color:var(--t1);transform:translateX(2px)}
.si.on{background:linear-gradient(135deg,rgba(124,92,252,.1),rgba(91,141,239,.06));color:var(--pl);font-weight:600}
.si.on::before{height:24px}
.si svg{width:18px;height:18px;flex-shrink:0}
.si span{white-space:nowrap;overflow:hidden}
.sbdg{margin-left:auto;background:linear-gradient(135deg,var(--err),#F43F5E);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;box-shadow:0 2px 8px rgba(251,113,133,.3)}
.sb-ft{padding:16px;border-top:1px solid var(--b)}
.sb-u{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;cursor:pointer;background:var(--glass3);transition:all .3s}
.sb-u:hover{background:var(--glass2)}
.av{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--p),var(--a));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 2px 10px rgba(124,92,252,.2)}

/* MAIN */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.top{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,14,30,.5);backdrop-filter:var(--blur);border-bottom:1px solid var(--b);gap:14px;z-index:50}
.mbtn{display:none;background:none;border:none;color:var(--t2);cursor:pointer;padding:4px;border-radius:8px}
.pgt{font-size:20px;font-weight:800;letter-spacing:-.02em;white-space:nowrap}
.srch{flex:1;max-width:340px;position:relative}
.srch input{width:100%;padding:9px 14px 9px 38px;background:var(--glass3);border:1px solid var(--b);border-radius:12px;color:var(--t1);font-size:13px;transition:all .3s}
.srch input:focus{border-color:rgba(124,92,252,.3);box-shadow:0 0 0 4px rgba(124,92,252,.06)}
.srch input::placeholder{color:var(--t4)}
.srch svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3)}
.nb{position:relative;width:38px;height:38px;border-radius:12px;background:var(--glass3);border:1px solid var(--b);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
.nb:hover{background:var(--glass2);color:var(--pl);border-color:rgba(124,92,252,.2);transform:translateY(-1px)}
.nb svg{width:17px;height:17px}
.ndot{position:absolute;top:-2px;right:-2px;min-width:17px;height:17px;background:linear-gradient(135deg,var(--err),#F43F5E);border-radius:9px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;padding:0 4px;animation:npop .4s ease}
@keyframes npop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.ct{flex:1;overflow-y:auto;padding:24px;scroll-behavior:smooth}

/* BUTTONS */
.btn{position:relative;padding:10px 20px;border-radius:12px;font-size:13.5px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:all .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;overflow:hidden}
.btn:active{transform:scale(.96)}
.bp2{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:0 4px 20px rgba(124,92,252,.3)}
.bp2:hover{box-shadow:0 6px 30px rgba(124,92,252,.45);transform:translateY(-2px)}
.bs2{background:var(--glass2);color:var(--t2);border:1px solid var(--bl)}.bs2:hover{background:var(--glass);color:var(--t1);transform:translateY(-1px)}
.bg2{background:transparent;color:var(--t2);border:none}.bg2:hover{color:var(--t1);background:var(--glass3)}
.bsm{padding:6px 12px;font-size:12px;border-radius:8px}

/* FORMS */
.fg{margin-bottom:15px}
.fl{display:block;font-size:11.5px;font-weight:600;color:var(--t3);margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.fw{position:relative}
.fw>svg:first-child{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--t4);pointer-events:none;transition:color .2s}
.fw .fi{padding-left:42px}
.fi,.ft,.fs2{width:100%;padding:11px 15px;background:rgba(15,20,45,.6);border:1px solid var(--b);border-radius:12px;color:var(--t1);font-size:14px;transition:all .3s}
.fi:focus,.ft:focus,.fs2:focus{border-color:rgba(124,92,252,.4);box-shadow:0 0 0 4px rgba(124,92,252,.08);background:rgba(15,20,45,.8)}
.fi::placeholder,.ft::placeholder{color:var(--t4)}
.ft{min-height:85px;resize:vertical;border-radius:14px}
.fs2{cursor:pointer;-webkit-appearance:none;appearance:none}
.pwt{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;display:flex}
.pwt:hover{color:var(--t1)}

/* BADGES */
.badge{padding:4px 10px;border-radius:8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.b-todo{background:rgba(96,165,250,.1);color:var(--info)}.b-ip{background:rgba(251,191,36,.1);color:var(--w)}.b-done{background:rgba(52,211,153,.1);color:var(--ok)}.b-arch{background:rgba(100,116,139,.1);color:var(--t3)}
.bpr{padding:3px 8px;border-radius:6px;font-size:9.5px;font-weight:700;text-transform:uppercase}
.bpr-low{background:rgba(52,211,153,.1);color:var(--ok)}.bpr-med{background:rgba(96,165,250,.1);color:var(--info)}.bpr-high{background:rgba(251,191,36,.1);color:var(--w)}.bpr-urg{background:rgba(251,113,133,.1);color:var(--err)}

/* TASK CARD */
.tc{background:var(--glass2);backdrop-filter:saturate(150%) blur(10px);border:1px solid var(--b);border-radius:16px;padding:15px 18px;transition:all .35s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;overflow:hidden;margin-bottom:9px}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0}
.tc.pl::before{background:var(--ok)}.tc.pm::before{background:var(--info)}.tc.ph::before{background:var(--w)}.tc.pu::before{background:var(--err)}
.tc:hover{transform:translateY(-3px);border-color:rgba(124,92,252,.12);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.tc.pin{border-color:rgba(251,191,36,.15)}
.ck{width:22px;height:22px;border-radius:8px;border:2px solid var(--b);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .3s;background:transparent}
.ck:hover{border-color:var(--ok)}.ck.on{border-color:var(--ok);background:linear-gradient(135deg,var(--ok),#10B981)}
.tag{padding:3px 8px;background:rgba(124,92,252,.08);color:var(--pl);border-radius:6px;font-size:10.5px;font-weight:600;border:1px solid rgba(124,92,252,.1)}
.pbar{width:100%;height:4px;background:rgba(148,163,184,.08);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--p),var(--p2));border-radius:4px;transition:width .6s}

/* NOTE CARD */
.ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.nc{background:var(--glass2);border:1px solid var(--b);border-radius:16px;padding:14px;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1)}
.nc:hover{transform:translateY(-4px);border-color:rgba(124,92,252,.12);box-shadow:0 12px 40px rgba(0,0,0,.3)}

/* STATS */
.stg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.stc{background:var(--glass2);border:1px solid var(--b);border-radius:16px;padding:18px;text-align:center;transition:all .4s;cursor:pointer}
.stc:hover{transform:translateY(-4px);border-color:rgba(124,92,252,.15);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.stv{font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--pl),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.stl{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;font-weight:600}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(4,6,14,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;animation:ovIn .25s ease}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.modal{background:rgba(15,20,45,.85);backdrop-filter:var(--blur);border:1px solid var(--b);border-radius:22px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:mdIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes mdIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--b)}
.mx{width:30px;height:30px;border-radius:10px;background:var(--glass3);border:1px solid var(--b);color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s}
.mx:hover{background:rgba(251,113,133,.1);color:var(--err);transform:rotate(90deg)}
.mb{padding:22px}
.mf{display:flex;justify-content:flex-end;gap:9px;padding:14px 22px;border-top:1px solid var(--b)}

/* TOGGLE */
.tg{position:relative;width:42px;height:22px;cursor:pointer;flex-shrink:0}
.tg input{opacity:0;width:0;height:0;position:absolute}
.tg-s{position:absolute;inset:0;background:rgba(15,20,45,.6);border:1px solid var(--b);border-radius:11px;transition:all .3s}
.tg-s::before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:var(--t3);border-radius:8px;transition:all .3s cubic-bezier(.4,0,.2,1)}
.tg input:checked+.tg-s{background:linear-gradient(135deg,var(--p),var(--p2));border-color:var(--p)}
.tg input:checked+.tg-s::before{transform:translateX(20px);background:#fff}

/* FILTERS */
.fbar{display:flex;align-items:center;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.fc{padding:6px 13px;border-radius:10px;font-size:11.5px;font-weight:600;background:var(--glass3);border:1px solid var(--b);color:var(--t3);cursor:pointer;transition:all .3s}
.fc:hover{border-color:rgba(124,92,252,.2);color:var(--t1)}
.fc.on{background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(91,141,239,.1));border-color:rgba(124,92,252,.25);color:var(--pl)}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--glass3);border-radius:12px;padding:3px;margin-bottom:18px;border:1px solid var(--b)}
.tab{padding:8px 16px;border-radius:9px;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .3s;border:none;background:none;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--t1)}.tab.on{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:0 4px 15px rgba(124,92,252,.25)}

/* NOTIF PANEL */
.np{position:fixed;top:0;right:0;width:360px;height:100vh;background:rgba(10,14,30,.88);backdrop-filter:var(--blur);border-left:1px solid var(--b);z-index:200;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.4);animation:slR .3s cubic-bezier(.4,0,.2,1)}
@keyframes slR{from{transform:translateX(100%)}to{transform:translateX(0)}}
.npi{padding:13px;border-radius:12px;background:var(--glass3);border:1px solid var(--b);margin-bottom:7px;cursor:pointer;transition:all .3s}
.npi:hover{background:var(--glass2);transform:translateX(-2px)}
.npi.od{border-left:3px solid var(--err)}.npi.up{border-left:3px solid var(--w)}

/* REM */
.rem{background:rgba(124,92,252,.04);border:1px solid rgba(124,92,252,.1);border-radius:var(--r);padding:14px;margin-top:6px}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 30px rgba(124,92,252,.4);z-index:90;border:none;transition:all .3s}
.fab:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 12px 40px rgba(124,92,252,.5)}
.fab:active{transform:scale(.95)}
.fab svg{width:22px;height:22px;transition:transform .3s}
.fab:hover svg{transform:rotate(90deg)}

/* AUTH */
.auth-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:20px;overflow-y:auto}
.auth-c{background:rgba(15,20,45,.6);backdrop-filter:var(--blur);border:1px solid var(--b);border-radius:22px;padding:36px 38px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 60px rgba(124,92,252,.05);animation:aIn .5s cubic-bezier(.4,0,.2,1)}
@keyframes aIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.auth-c .bp2{width:100%;justify-content:center;padding:12px;font-size:14.5px;border-radius:14px}
.aggl{width:100%;padding:11px;border-radius:14px;background:var(--glass3);border:1px solid var(--b);color:var(--t1);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s}
.aggl:hover{background:var(--glass2);border-color:rgba(148,163,184,.15);transform:translateY(-1px)}
.spn{width:18px;height:18px;border:2px solid transparent;border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:none}
.btn.ld .spn{display:block}.btn.ld>span{opacity:.5}
@keyframes sp{to{transform:rotate(360deg)}}

/* EMPTY */
.emp{text-align:center;padding:50px 20px;color:var(--t4)}
.greet{margin-bottom:22px}.greet h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:3px}.greet p{color:var(--t3);font-size:13.5px}
.arow{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.sbov{position:fixed;inset:0;background:rgba(4,6,14,.6);backdrop-filter:blur(4px);z-index:150;display:none}.sbov.show{display:block}

/* CTX */
.ctx{position:absolute;top:42px;right:8px;background:rgba(15,20,45,.92);backdrop-filter:var(--blur);border:1px solid var(--b);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:50;min-width:150px;overflow:hidden;padding:5px;animation:ctxA .2s ease}
@keyframes ctxA{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-i{display:flex;align-items:center;gap:9px;padding:9px 13px;font-size:12.5px;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .2s;border-radius:9px}
.ctx-i:hover{background:var(--glass3);color:var(--t1)}
.ctx-i.red{color:var(--err)}.ctx-i.green{color:var(--ok)}.ctx-i.yellow{color:var(--w)}

/* COLORS */
.cpk{display:flex;gap:7px;flex-wrap:wrap}
.cdot{width:26px;height:26px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.cdot:hover{transform:scale(1.15)}.cdot.on{border-color:rgba(255,255,255,.6);box-shadow:0 0 0 3px rgba(124,92,252,.3)}

/* SUB */
.subi{display:flex;align-items:center;gap:7px;padding:5px 0;font-size:12.5px}
.subi input[type=checkbox]{accent-color:var(--p);width:15px;height:15px;cursor:pointer}
.subi.dn span{text-decoration:line-through;color:var(--t4)}
.asub{display:flex;gap:7px;margin-top:7px}
.asub input{flex:1;padding:7px 11px;background:rgba(15,20,45,.6);border:1px solid var(--b);border-radius:10px;color:var(--t1);font-size:12.5px;outline:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fIn{animation:fadeUp .3s ease}

/* ═══ PRO DATE PICKER ═══ */
.date-card{background:rgba(124,92,252,.03);border:1px solid rgba(124,92,252,.08);border-radius:14px;padding:14px 16px;margin-bottom:6px;transition:all .3s}
.date-card:hover{border-color:rgba(124,92,252,.15)}
.date-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.date-card-header svg{width:16px;height:16px;color:var(--pl);flex-shrink:0}
.date-card-header span{font-size:12.5px;font-weight:600;color:var(--pl)}

// Simple hash (for localStorage demo - not production crypto)

function fmtDate(d){if(!d)return'';const dt=new Date(d),now=new Date(),m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];if(dt.toDateString()===now.toDateString())return'Today';return m[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear()}
function fmtTime(d){if(!d)return'';const dt=new Date(d);let h=dt.getHours(),m=dt.getMinutes(),a='AM';if(h>=12){a='PM';if(h>12)h-=12}if(h===0)h=12;return h+':'+(m<10?'0':'')+m+' '+a}
function isPast(d){return d&&new Date(d)<new Date()}
function isToday(d){return d&&new Date(d).toDateString()===new Date().toDateString()}
function timeAgo(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function toast(msg,type='ok'){const t=h('div','',`<div style="display:flex;align-items:center;gap:8px">${type==='ok'?'<span style="color:var(--ok)">✓</span>':'<span style="color:var(--err)">✕</span>'}<span>${msg}</span></div>`);Object.assign(t.style,{position:'fixed',bottom:'24px',right:'24px',background:'rgba(15,20,45,.88)',backdropFilter:'saturate(180%) blur(20px)',color:'#F1F5F9',padding:'12px 20px',borderRadius:'14px',fontSize:'13px',fontWeight:'500',fontFamily:'var(--f)',zIndex:'9999',animation:'fadeUp .3s ease',boxShadow:'0 8px 30px rgba(0,0,0,.4)',border:'1px solid rgba(148,163,184,.06)'});document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(10px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300)},2500)}
function toLocal(d){if(!d)return'';const dt=new Date(d),off=dt.getTimezoneOffset();return new Date(dt.getTime()-off*60000).toISOString().slice(0,16)}

// BG Scene
function bgHTML(){let p='';for(let i=0;i<12;i++){const x=Math.random()*100,dur=15+Math.random()*25,del=Math.random()*20,s=2+Math.random()*3;p+=`<div class="bgP" style="left:${x}%;width:${s}px;height:${s}px;animation-duration:${dur}s;animation-delay:-${del}s;opacity:${.2+Math.random()*.4}"></div>`}return`<div class="bgS"><div class="bgG"></div><div class="bgB b1"></div><div class="bgB b2"></div><div class="bgB b3"></div><div class="bgE e1"></div><div class="bgE e2"></div>${p}</div>`}

// ── NOTIFICATION SYSTEM ───────────────────────────

// Send a real device notification (works on Android, iOS Safari 16.4+, Desktop)
function sendDeviceNotif(title,body,tag,data){
  if(!('Notification' in window)||Notification.permission!=='granted')return false;
  try{
    const n=new Notification(title,{
      body:body,
      icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%237C5CFC"/><text x="50" y="68" font-size="55" font-weight="900" fill="white" text-anchor="middle" font-family="sans-serif">S</text></svg>',

// Play notification sound (subtle chime)
function playNotifSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.setValueAtTime(1100,ctx.currentTime+0.1);
    osc.frequency.setValueAtTime(880,ctx.currentTime+0.2);
    gain.gain.setValueAtTime(0.15,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.4);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
  }catch(e){}
}

function showInAppNotif(title,body){

    </div>
    <div style="color:#64748B;cursor:pointer;padding:2px" onclick="this.parentElement.parentElement.remove()">✕</div>
  </div>`;
  el.onclick=()=>{el.remove();S.page='tasks';render()};

  setTimeout(()=>{if(el.parentElement){el.style.opacity='0';el.style.transform='translateY(-10px) translateX(20px)';el.style.transition='all .3s';setTimeout(()=>el.remove(),300)}},8000);
}

// Main checker — runs every 15s
function startNotif(){
  if(_nt)clearInterval(_nt);
  requestNotifPermission();
  _nt=setInterval(checkRem,15000);
  checkRem();
}

// Track which notifications we already sent this session (avoid spam)
let _sentNotifs=new Set();

function checkRem(){
  if(!S.session)return;
  const tasks=DB.getTasks(S.session.id);
  const now=Date.now();
  let changed=false;

  tasks.forEach(t=>{
    if(t.status==='done'||t.status==='archived')return;

    // 1) REMINDER — exact time trigger
    if(t.reminder?.enabled&&t.reminder.at&&!t.reminder.sent){
      const remTime=new Date(t.reminder.at).getTime();
      if(remTime<=now){
        const nKey='rem_'+t.id+'_'+t.reminder.at;
        if(!_sentNotifs.has(nKey)){
          _sentNotifs.add(nKey);
          const sent=sendDeviceNotif(
            '🔔 Reminder: '+t.title,
            (t.description||'Your reminder is due now!')+(t.priority==='urgent'?' ⚠️ URGENT':''),
            'reminder-'+t.id,
            {page:'tasks',taskId:t.id}
          );
          if(!sent)showInAppNotif('🔔 Reminder',t.title+(t.priority==='urgent'?' — URGENT':''));
        }
        // Handle recurring
        if(t.reminder.recurring&&t.reminder.recurring!=='none'){
          const next=new Date(t.reminder.at);
          if(t.reminder.recurring==='daily')next.setDate(next.getDate()+1);
          else if(t.reminder.recurring==='weekly')next.setDate(next.getDate()+7);
          else if(t.reminder.recurring==='monthly')next.setMonth(next.getMonth()+1);
          t.reminder.at=next.toISOString();
          t.reminder.sent=false;
          _sentNotifs.delete(nKey);
        }else{
          t.reminder.sent=true;
        }
        changed=true;
      }
    }

    // 2) DUE DATE — notify when overdue (once per task)
    if(t.dueDate){
      const dueTime=new Date(t.dueDate).getTime();
      const overdueKey='overdue_'+t.id;
      // Just became overdue (within last 60 seconds)
      if(dueTime<=now&&dueTime>(now-60000)&&!_sentNotifs.has(overdueKey)){
        _sentNotifs.add(overdueKey);
        sendDeviceNotif(
          '⚠️ Task Overdue: '+t.title,
          'This task is now past its due date!',
          'overdue-'+t.id,
          {page:'tasks',taskId:t.id}
        );
      }
      // Upcoming: 15 min warning
      const warn15=dueTime-15*60000;
      const warnKey='warn15_'+t.id;
      if(warn15<=now&&warn15>(now-60000)&&!_sentNotifs.has(warnKey)){
        _sentNotifs.add(warnKey);
        sendDeviceNotif(
          '⏰ Due in 15 minutes: '+t.title,
          'Your task is due soon — take action!',
          'warn-'+t.id,
          {page:'tasks',taskId:t.id}
        );
      }
    }
  });

  if(changed){DB.setTasks(S.session.id,tasks);render()}

  // Also check event reminders
  const events=DB.getEvents(S.session.id);
  events.forEach(ev=>{
    if(!ev.reminderMin||ev.reminderMin==='none')return;
    const evTime=new Date(ev.date).getTime();
    const remTime=evTime-parseInt(ev.reminderMin)*60000;
    const evKey='ev_'+ev.id;
    if(remTime<=now&&remTime>(now-60000)&&!_sentNotifs.has(evKey)){
      _sentNotifs.add(evKey);
      sendDeviceNotif('📅 Event: '+ev.title,(ev.location?'📍 '+ev.location+' · ':'')+fmtTime(ev.date),'ev-'+ev.id,{page:'calendar'});
    }
  });
}

function renderAuth(root){
  let mode='login',showPw=false;

    root.innerHTML=bgHTML()+`<div class="auth-pg"><div class="auth-c">

      <form id="authForm" autocomplete="off">
        ${mode==='register'?`<div class="fg"><label class="fl">Full Name</label><div class="fw">${I.user}<input class="fi" id="aName" placeholder="John Doe" required></div></div>`:''}
        <div class="fg"><label class="fl">Email</label><div class="fw">${I.mail}<input class="fi" type="email" id="aEmail" placeholder="you@example.com" required></div></div>
        <div class="fg"><label class="fl">Password</label><div class="fw">${I.lock}<input class="fi" type="${showPw?'text':'password'}" id="aPw" placeholder="${mode==='register'?'Min 6 characters':'••••••••'}" required ${mode==='register'?'minlength="6"':''}><button type="button" class="pwt" id="pwTog">${showPw?I.eyeOff:I.eye}</button></div></div>
        ${mode==='register'?`<div class="fg"><label class="fl">Confirm Password</label><div class="fw">${I.lock}<input class="fi" type="password" id="aPw2" placeholder="Repeat password" required></div></div>`:''}
        ${mode==='login'?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px;color:var(--t3)"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" checked style="accent-color:var(--p);width:14px;height:14px"> Remember me</label><a href="#" style="color:var(--pl);font-weight:500" onclick="event.preventDefault();toast('Reset feature coming soon!','err')">Forgot password?</a></div>`:''}
        <button class="btn bp2" type="submit" id="authBtn" style="margin-top:6px"><span>${mode==='login'?'Sign In':'Create Account'}</span><div class="spn"></div></button>
      </form>
      <p style="text-align:center;margin-top:22px;font-size:12.5px;color:var(--t4)">${mode==='login'?"Don't have an account? <a id='authSwitch' style='color:var(--pl);font-weight:600;cursor:pointer'>Sign up free</a>":"Already have an account? <a id='authSwitch' style='color:var(--pl);font-weight:600;cursor:pointer'>Sign in</a>"}</p>
    </div></div>`;

    $('#authSwitch').onclick=e=>{e.preventDefault();mode=mode==='login'?'register':'login';showPw=false;draw()};
    $('#pwTog').onclick=()=>{showPw=!showPw;draw()};

    $('#authForm').onsubmit=async e=>{
      e.preventDefault();
      const btn=$('#authBtn');btn.classList.add('ld');
      const email=$('#aEmail').value.trim().toLowerCase();
      const pw=$('#aPw').value;

      setTimeout(async()=>{
        btn.classList.remove('ld');
        if(mode==='register'){
          const name=$('#aName').value.trim();
          const pw2=$('#aPw2').value;
          if(!name){toast('Name is required','err');return}
          if(pw.length<6){toast('Password must be at least 6 characters','err');return}
          if(pw!==pw2){toast("Passwords don't match",'err');return}
          const users=DB.getUsers();
          if(users.find(u=>u.email===email)){toast('An account with this email already exists','err');return}
          const pwHash=await hashPw(pw);
          const newUser={id:uid(),name,email,pwHash,created:new Date().toISOString()};
          users.push(newUser);DB.saveUsers(users);
          S.session={id:newUser.id,name:newUser.name,email:newUser.email};
          DB.setSession(S.session);
          toast('Welcome to Shepino Tasks! 🎉');render();
        }else{
          const users=DB.getUsers();
          const user=users.find(u=>u.email===email);
          if(!user){toast('No account found with this email','err');return}
          const pwHash=await hashPw(pw);
          if(user.pwHash!==pwHash){toast('Incorrect password','err');return}
          S.session={id:user.id,name:user.name,email:user.email};
          DB.setSession(S.session);
          toast('Welcome back! 🚀');render();
        }
      },700);
    };
  }draw();
}

// ═══ TASK CARD ═══
function taskCard(t,o={}){
  const dn=t.status==='done',od=t.dueDate&&isPast(t.dueDate)&&!dn&&t.status!=='archived',subD=t.subtasks?t.subtasks.filter(s=>s.done).length:0,subT=t.subtasks?t.subtasks.length:0;
  const pc={low:'pl',medium:'pm',high:'ph',urgent:'pu'}[t.priority]||'pm';
  const sc={todo:'b-todo','in-progress':'b-ip',done:'b-done',archived:'b-arch'}[t.status]||'b-todo';
  const sl={todo:'Todo','in-progress':'In Progress',done:'Done',archived:'Archived'}[t.status]||t.status;
  const bpc={low:'bpr-low',medium:'bpr-med',high:'bpr-high',urgent:'bpr-urg'}[t.priority]||'bpr-med';
  const d=h('div',`tc ${pc} ${t.pinned?'pin':''}`);
  d.innerHTML=`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div style="display:flex;align-items:center;gap:9px;flex:1;min-width:0"><div class="ck ${dn?'on':''}" data-ck="${t.id}">${I.chk}</div><span style="font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:${dn?'line-through':'none'};opacity:${dn?.35:1}">${t.pinned?'<span style="color:var(--w);margin-right:3px">'+I.star+'</span>':''}${esc(t.title)}</span></div><div style="display:flex;gap:3px;align-items:center;flex-shrink:0"><span class="badge ${sc}">${sl}</span>${o.noCtx?'':`<button class="btn bg2 bsm" style="width:28px;height:28px;padding:0" data-ctx="${t.id}">${I.dots}</button>`}</div></div>
  ${t.description?`<p style="font-size:12px;color:var(--t3);margin:4px 0 0 31px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(t.description)}</p>`:''}
  ${subT?`<div style="margin:5px 0 0 31px"><div style="font-size:10.5px;color:var(--t4);margin-bottom:3px;font-weight:500">Subtasks ${subD}/${subT}</div><div class="pbar"><div class="pfill" style="width:${(subD/subT)*100}%"></div></div></div>`:''}
  <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:7px 0 0 31px"><span class="${bpc} bpr">${t.priority}</span><span style="font-size:11px;color:var(--t3);font-weight:500">${esc(t.category||'General')}</span>${t.dueDate?`<span style="font-size:11px;color:${od?'var(--err)':'var(--t3)'};display:flex;align-items:center;gap:3px">${I.clock}${isToday(t.dueDate)?'Today '+fmtTime(t.dueDate):fmtDate(t.dueDate)}</span>`:''}${t.reminder?.enabled?`<span style="font-size:11px;color:var(--pl);display:flex;align-items:center;gap:3px">${I.bell}</span>`:''}</div>
  ${t.tags?.length?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin:5px 0 0 31px">${t.tags.slice(0,4).map(tg=>`<span class="tag">${esc(tg)}</span>`).join('')}</div>`:''}
  ${!o.noCtx&&S.ctx===t.id?`<div class="ctx" onclick="event.stopPropagation()"><button class="ctx-i" data-act="edit" data-tid="${t.id}">${I.edit} Edit</button><button class="ctx-i" data-act="pin" data-tid="${t.id}">${I.pin} ${t.pinned?'Unpin':'Pin'}</button>${t.status!=='done'?`<button class="ctx-i green" data-act="done" data-tid="${t.id}">${I.chk} Done</button>`:''}${t.status!=='in-progress'&&t.status!=='done'?`<button class="ctx-i yellow" data-act="ip" data-tid="${t.id}">${I.clock} In Progress</button>`:''}<button class="ctx-i red" data-act="del" data-tid="${t.id}">${I.trash} Delete</button></div>`:''}`;
  d.onclick=e=>{if(e.target.closest('[data-ck]')||e.target.closest('[data-ctx]')||e.target.closest('.ctx'))return;openTaskModal(t)};
  const ck=d.querySelector('[data-ck]');if(ck)ck.onclick=e=>{e.stopPropagation();toggleDone(t.id)};
  const cb=d.querySelector('[data-ctx]');if(cb)cb.onclick=e=>{e.stopPropagation();S.ctx=S.ctx===t.id?null:t.id;render()};
  d.querySelectorAll('[data-act]').forEach(b=>b.onclick=e=>{e.stopPropagation();const a=b.dataset.act,id=b.dataset.tid;if(a==='edit')openTaskModal(findTask(id));else if(a==='pin')togglePin(id);else if(a==='done')setStatus(id,'done');else if(a==='ip')setStatus(id,'in-progress');else if(a==='del')delTask(id);S.ctx=null});
  return d;
}

// TASK CRUD
function findTask(id){return DB.getTasks(S.session.id).find(t=>t.id===id)}
function toggleDone(id){const ts=DB.getTasks(S.session.id);const t=ts.find(x=>x.id===id);if(t){t.status=t.status==='done'?'todo':'done';t.updatedAt=new Date().toISOString();DB.setTasks(S.session.id,ts);toast(t.status==='done'?'Task completed ✅':'Task reopened');render()}}
function togglePin(id){const ts=DB.getTasks(S.session.id);const t=ts.find(x=>x.id===id);if(t){t.pinned=!t.pinned;DB.setTasks(S.session.id,ts);render()}}
function setStatus(id,s){const ts=DB.getTasks(S.session.id);const t=ts.find(x=>x.id===id);if(t){t.status=s;t.updatedAt=new Date().toISOString();DB.setTasks(S.session.id,ts);toast('Status updated');render()}}
function delTask(id){if(!confirm('Delete this task?'))return;DB.setTasks(S.session.id,DB.getTasks(S.session.id).filter(t=>t.id!==id));toast('Deleted');render()}
function saveTask(d){const ts=DB.getTasks(S.session.id);if(d.id){const i=ts.findIndex(t=>t.id===d.id);if(i>=0){ts[i]={...ts[i],...d,updatedAt:new Date().toISOString()};toast('Updated ✅')}}else{d.id=uid();d.createdAt=new Date().toISOString();d.updatedAt=d.createdAt;ts.unshift(d);toast('Created 🎉')}DB.setTasks(S.session.id,ts);render()}

// ═══ TASK MODAL ═══
function openTaskModal(task=null){
  const COLORS=['#7C5CFC','#F472B6','#34D399','#FBBF24','#60A5FA','#FB7185','#A78BFA','#F97316'];

      <div class="fg"><label class="fl">Description</label><textarea class="ft" id="mD" placeholder="Details…" rows="2">${esc(f.description)}</textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px"><div class="fg"><label class="fl">Status</label><select class="fs2" id="mS"><option value="todo"${f.status==='todo'?' selected':''}>To Do</option><option value="in-progress"${f.status==='in-progress'?' selected':''}>In Progress</option><option value="done"${f.status==='done'?' selected':''}>Done</option><option value="archived"${f.status==='archived'?' selected':''}>Archived</option></select></div><div class="fg"><label class="fl">Priority</label><select class="fs2" id="mP"><option value="low"${f.priority==='low'?' selected':''}>Low</option><option value="medium"${f.priority==='medium'?' selected':''}>Medium</option><option value="high"${f.priority==='high'?' selected':''}>High</option><option value="urgent"${f.priority==='urgent'?' selected':''}>Urgent</option></select></div><div class="fg"><label class="fl">Category</label><select class="fs2" id="mC">${CATS.map(c=>`<option${f.category===c?' selected':''}>${c}</option>`).join('')}</select></div></div>
      <!-- PRO DUE DATE CARD -->
      <div class="date-card">
        <div class="date-card-header">${I.cal}<span>Due Date</span></div>
        <input type="datetime-local" id="mDu" value="${f.dueDate}">
        <div class="date-presets" id="dueDatePresets">
          <span class="date-preset" data-dp="today">Today</span>
          <span class="date-preset" data-dp="tomorrow">Tomorrow</span>
          <span class="date-preset" data-dp="week">In 1 Week</span>
          <span class="date-preset" data-dp="month">In 1 Month</span>
          <span class="date-preset" data-dp="clear" style="color:var(--err)">Clear</span>
        </div>
        ${f.dueDate?`<div class="date-summary">${I.clock}<span>Due: ${new Date(f.dueDate).toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span></div>`:''}
      </div>

      <!-- PRO REMINDER CARD -->
      <div class="date-card" style="border-color:${f.reminder.enabled?'rgba(124,92,252,.18)':'rgba(124,92,252,.08)'}">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="date-card-header" style="margin-bottom:0">${I.bell}<span>Reminder</span></div>
          <label class="tg"><input type="checkbox" id="mRE"${f.reminder.enabled?' checked':''}><span class="tg-s"></span></label>
        </div>
        <div id="remF" style="display:${f.reminder.enabled?'block':'none'};margin-top:12px">
          <div style="margin-bottom:10px">
            <label class="fl" style="display:flex;align-items:center;gap:4px">${I.clock} Remind at</label>
            <input type="datetime-local" id="mRA" value="${f.reminder.at}" style="width:100%;padding:10px 14px;background:rgba(15,20,45,.5);border:1px solid rgba(124,92,252,.1);border-radius:10px;color:var(--t1);font-size:13.5px;font-family:var(--f)">
            <div class="date-presets" id="remPresets">
              <span class="date-preset" data-rp="10m">10 min before</span>
              <span class="date-preset" data-rp="30m">30 min</span>
              <span class="date-preset" data-rp="1h">1 hour</span>
              <span class="date-preset" data-rp="1d">1 day</span>
            </div>
          </div>
          <div>
            <label class="fl" style="display:flex;align-items:center;gap:4px">🔁 Repeat</label>
            <div style="display:flex;gap:5px;flex-wrap:wrap">
              ${['none','daily','weekly','monthly'].map(r=>`<span class="date-preset ${f.reminder.recurring===r?'on':''}" data-rc="${r}" style="${f.reminder.recurring===r?'background:rgba(124,92,252,.15);color:var(--pl);border-color:rgba(124,92,252,.2)':''}">${r==='none'?'No repeat':r[0].toUpperCase()+r.slice(1)}</span>`).join('')}
            </div>
          </div>
          ${f.reminder.at?`<div class="date-summary" style="margin-top:8px">${I.bell}<span>Reminder: ${new Date(f.reminder.at).toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}${f.reminder.recurring!=='none'?' · Repeats '+f.reminder.recurring:''}</span></div>`:''}
        </div>
      </div>
      <div class="fg" style="margin-top:14px"><label class="fl">Tags</label><div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px">${f.tags.map(t=>`<span class="tag" style="cursor:pointer" data-rt="${t}">${esc(t)} ×</span>`).join('')}</div><div style="display:flex;gap:7px"><input class="fi" id="mTI" placeholder="Add tag…" style="flex:1"><button class="btn bs2 bsm" id="mTA">Add</button></div></div>
      <div class="fg"><label class="fl">Subtasks ${f.subtasks.length?`(${sd}/${f.subtasks.length})`:''}</label>${f.subtasks.length?`<div class="pbar" style="margin-bottom:6px"><div class="pfill" style="width:${pct}%"></div></div>`:''}<div>${f.subtasks.map((s,i)=>`<div class="subi ${s.done?'dn':''}"><input type="checkbox"${s.done?' checked':''} data-si="${i}"><span style="flex:1">${esc(s.title)}</span><button class="btn bg2 bsm" style="padding:2px;color:var(--err)" data-rs="${i}">${I.trash}</button></div>`).join('')}</div><div class="asub"><input id="mSI" placeholder="Add subtask…"><button class="btn bs2 bsm" id="mSA">${I.plus}</button></div></div>
      <div class="fg"><label class="fl">Notes</label><textarea class="ft" id="mN" placeholder="Private notes…" rows="2">${esc(f.notes)}</textarea></div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:14px"><div><label class="fl">Color</label><div class="cpk">${COLORS.map(c=>`<div class="cdot${f.color===c?' on':''}" style="background:${c}" data-cl="${c}"></div>`).join('')}</div></div><div style="text-align:right"><label class="fl">Pin</label><label class="tg"><input type="checkbox" id="mPi"${f.pinned?' checked':''}><span class="tg-s"></span></label></div></div>
    </div><div class="mf"><button class="btn bs2" id="mCa">Cancel</button><button class="btn bp2" id="mSv">${task?'Update':'Create'} Task</button></div></div>`;
    document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)clM()};$('#mx').onclick=clM;$('#mCa').onclick=clM;
    $('#mRE').onchange=e=>{f.reminder.enabled=e.target.checked;$('#remF').style.display=e.target.checked?'block':'none'};
    // Due date presets
    $$('[data-dp]').forEach(b=>b.onclick=()=>{const now=new Date();let d=null;if(b.dataset.dp==='today'){d=new Date(now.getFullYear(),now.getMonth(),now.getDate(),17,0)}else if(b.dataset.dp==='tomorrow'){d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,17,0)}else if(b.dataset.dp==='week'){d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+7,17,0)}else if(b.dataset.dp==='month'){d=new Date(now.getFullYear(),now.getMonth()+1,now.getDate(),17,0)}if(d){f.dueDate=toLocal(d)}else{f.dueDate=''}drawM()});
    // Reminder presets (relative to due date)
    $$('[data-rp]').forEach(b=>b.onclick=()=>{const base=f.dueDate?new Date(f.dueDate):new Date();const p=b.dataset.rp;let d=new Date(base);if(p==='10m')d.setMinutes(d.getMinutes()-10);else if(p==='30m')d.setMinutes(d.getMinutes()-30);else if(p==='1h')d.setHours(d.getHours()-1);else if(p==='1d')d.setDate(d.getDate()-1);f.reminder.at=toLocal(d);f.reminder.enabled=true;drawM()});
    // Recurring toggle
    $$('[data-rc]').forEach(b=>b.onclick=()=>{f.reminder.recurring=b.dataset.rc;drawM()});
    $$('[data-rt]').forEach(b=>b.onclick=()=>{f.tags=f.tags.filter(t=>t!==b.dataset.rt);drawM()});
    const aT=()=>{const v=$('#mTI').value.trim();if(v&&!f.tags.includes(v)){f.tags.push(v);drawM()}};$('#mTA').onclick=aT;$('#mTI').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();aT()}};
    $$('[data-si]').forEach(cb=>cb.onchange=()=>{f.subtasks[+cb.dataset.si].done=cb.checked;drawM()});
    $$('[data-rs]').forEach(b=>b.onclick=()=>{f.subtasks.splice(+b.dataset.rs,1);drawM()});
    const aS=()=>{const v=$('#mSI').value.trim();if(v){f.subtasks.push({id:uid(),title:v,done:false});drawM()}};$('#mSA').onclick=aS;$('#mSI').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();aS()}};
    $$('[data-cl]').forEach(d=>d.onclick=()=>{f.color=d.dataset.cl;drawM()});
    $('#mSv').onclick=()=>{const t=$('#mT').value.trim();if(!t){toast('Title required','err');return}saveTask({...(task?{id:task.id}:{}),title:t,description:$('#mD').value,status:$('#mS').value,priority:$('#mP').value,category:$('#mC').value,tags:f.tags,dueDate:$('#mDu').value?new Date($('#mDu').value).toISOString():null,reminder:{enabled:$('#mRE').checked,at:$('#mRA').value?new Date($('#mRA').value).toISOString():null,recurring:f.reminder.recurring||'none',sent:false},subtasks:f.subtasks,notes:$('#mN').value,pinned:$('#mPi').checked,color:f.color});clM()};
    setTimeout(()=>$('#mT')?.focus(),100);
  }function clM(){const o=$('.ov');if(o)o.remove()}drawM();
}

// ═══ TASKS PAGE ═══
function tasksPage(ct){
  let ts=DB.getTasks(S.session.id);
  if(S.tf==='pinned')ts=ts.filter(t=>t.pinned);else if(S.tf!=='all')ts=ts.filter(t=>t.status===S.tf);
  if(S.tp)ts=ts.filter(t=>t.priority===S.tp);
  if(S.search){const q=S.search.toLowerCase();ts=ts.filter(t=>(t.title+' '+t.description+' '+(t.tags||[]).join(' ')).toLowerCase().includes(q))}
  if(S.ts==='dueDate')ts.sort((a,b)=>(a.dueDate||'z').localeCompare(b.dueDate||'z'));else if(S.ts==='priority'){const po={urgent:0,high:1,medium:2,low:3};ts.sort((a,b)=>(po[a.priority]||2)-(po[b.priority]||2))}else if(S.ts==='title')ts.sort((a,b)=>a.title.localeCompare(b.title));else ts.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||new Date(b.createdAt)-new Date(a.createdAt));
  ct.innerHTML=`<div class="fIn"><div class="arow"><button class="btn bp2" id="newT">${I.plus} New Task</button><select class="fs2" style="width:auto;padding:7px 14px;font-size:12px;max-width:150px" id="sortS"><option value="">Sort: Latest</option><option value="dueDate"${S.ts==='dueDate'?' selected':''}>Due Date</option><option value="priority"${S.ts==='priority'?' selected':''}>Priority</option><option value="title"${S.ts==='title'?' selected':''}>Title</option></select></div>
  <div class="fbar">${['all','todo','in-progress','done','archived','pinned'].map(s=>`<button class="fc${S.tf===s?' on':''}" data-tf="${s}">${s==='all'?'All':s==='in-progress'?'In Progress':s==='pinned'?'📌 Pinned':s[0].toUpperCase()+s.slice(1)}</button>`).join('')}<span style="color:var(--b);margin:0 3px">|</span>${['','low','medium','high','urgent'].map(p=>`<button class="fc${S.tp===p?' on':''}" data-tp="${p}">${p||'All Priority'}</button>`).join('')}</div>
  <div id="tl"></div>
  ${!ts.length?`<div class="emp"><div style="font-size:50px;margin-bottom:14px;opacity:.3">📋</div><h3 style="font-size:16px;color:var(--t2);font-weight:700;margin-bottom:6px">No tasks found</h3><p style="font-size:13px;max-width:340px;margin:0 auto 16px;color:var(--t4)">Create a new task to get started.</p><button class="btn bp2" id="newT2">${I.plus} Create Task</button></div>`:''}</div>`;
  const tl=$('#tl');ts.forEach(t=>tl.appendChild(taskCard(t)));
  $('#newT').onclick=()=>openTaskModal();const n2=$('#newT2');if(n2)n2.onclick=()=>openTaskModal();
  $('#sortS').onchange=e=>{S.ts=e.target.value;render()};
  $$('[data-tf]').forEach(b=>b.onclick=()=>{S.tf=b.dataset.tf;S.search='';render()});
  $$('[data-tp]').forEach(b=>b.onclick=()=>{S.tp=b.dataset.tp;render()});
  ct.onclick=e=>{if(!e.target.closest('[data-ctx]')&&!e.target.closest('.ctx')&&S.ctx){S.ctx=null;render()}};
}

  $$('[data-nd]').forEach(b=>b.onclick=e=>{e.stopPropagation();if(confirm('Delete?')){DB.setNotes(S.session.id,DB.getNotes(S.session.id).filter(n=>n.id!==b.dataset.nd));toast('Deleted');render()}});
  $('#newN').onclick=()=>openNoteModal();const n2=$('#newN2');if(n2)n2.onclick=()=>openNoteModal();
  const nq=$('#nQ');if(nq)nq.oninput=()=>{S.ns=nq.value;render()};
  $$('[data-nc]').forEach(b=>b.onclick=()=>{S.nc=b.dataset.nc;render()});
}

// ═══ CALENDAR & EVENTS ═══
function calendarPage(ct){
  const y=S.calY,m=S.calM;
  const fd=new Date(y,m,1).getDay(); // first day of week (0=Sun)
  const dim=new Date(y,m+1,0).getDate(); // days in month
  const pd=new Date(y,m,0).getDate(); // days in prev month
  const events=DB.getEvents(S.session.id);
  const tasks=DB.getTasks(S.session.id);
  const today=new Date();
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayNamesShort=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Get all events+tasks for a given day number
  function evOn(d,month,year){
    const ds=new Date(year||y,month!==undefined?month:m,d).toDateString();
    return[
      ...events.filter(e=>new Date(e.date).toDateString()===ds).map(e=>({...e,type:'event'})),
      ...tasks.filter(t=>t.dueDate&&new Date(t.dueDate).toDateString()===ds&&t.status!=='archived').map(t=>({title:t.title,date:t.dueDate,color:t.priority==='urgent'?'#FB7185':t.priority==='high'?'#FBBF24':'#60A5FA',type:'task',id:t.id}))
    ].sort((a,b)=>new Date(a.date)-new Date(b.date));
  }

  // Build event HTML inside a cell
  function cellEvHTML(evs){
    const MAX=3;
    let html='';
    evs.slice(0,MAX).forEach(e=>{
      const time=fmtTime(e.date);
      const col=e.color||'#7C5CFC';
      if(e.type==='task'){
        html+=`<div class="cal-ev task-ev" title="${esc(e.title)}"><span class="ev-time">${time}</span> ${esc(e.title)}</div>`;
      }else{
        html+=`<div class="cal-ev event-ev" style="background:${col}22;color:${col};border-left-color:${col}" title="${esc(e.title)}"><span class="ev-time">${time}</span> ${esc(e.title)}</div>`;
      }
    });
    if(evs.length>MAX) html+=`<div class="cal-ev-more">+${evs.length-MAX} more</div>`;
    return html;
  }

  // Build table rows (6 weeks max)
  let rows='';
  let dayCounter=1;
  let started=false;
  let finished=false;
  for(let week=0;week<6;week++){
    if(finished)break;
    let row='<tr>';
    for(let dow=0;dow<7;dow++){
      if(!started&&dow<fd){
        // Previous month days
        const prevD=pd-fd+1+dow;
        row+=`<td><div class="cal-cell other"><span class="day-num">${prevD}</span></div></td>`;
      }else if(!finished){
        if(!started)started=true;
        if(dayCounter>dim){
          // Next month days
          const nextD=dayCounter-dim;
          row+=`<td><div class="cal-cell other"><span class="day-num">${nextD}</span></div></td>`;
          dayCounter++;
          if(nextD>=7)finished=true;
        }else{
          const d=dayCounter;
          const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
          const isSel=S.calSel===d;
          const evs=evOn(d);
          row+=`<td><div class="cal-cell${isT?' today':''}${isSel?' sel':''}" data-cd="${d}"><span class="day-num">${d}</span>${cellEvHTML(evs)}</div></td>`;
          dayCounter++;
        }
      }else{
        row+=`<td><div class="cal-cell other"></div></td>`;
      }
    }
    row+='</tr>';
    rows+=row;
  }

  // Selected day detail
  const selDay=S.calSel||(m===today.getMonth()&&y===today.getFullYear()?today.getDate():1);
  const selEvts=evOn(selDay);
  const selDate=new Date(y,m,selDay);
  const selDateStr=dayNames[selDate.getDay()]+', '+MNF[m]+' '+selDay+', '+y;

  ct.innerHTML=`<div class="fIn">
  <!-- CALENDAR GRID -->
  <div class="cal-wrap">
    <div class="cal-nav">
      <button class="btn bg2 bsm" id="calP" style="padding:6px 10px">${I.chevL}</button>
      <div style="text-align:center">
        <h3>${MNF[m]} ${y}</h3>
        <div style="font-size:10.5px;color:var(--t4);margin-top:1px">Click a day to view details</div>
      </div>
      <button class="btn bg2 bsm" id="calN" style="padding:6px 10px">${I.chevR}</button>
    </div>
    <table class="cal-table">
      <thead><tr>${dayNamesShort.map(d=>`<th>${d}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>

  <!-- SELECTED DAY DETAIL -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div>
      <h3 style="font-size:15px;font-weight:700">${MN[m]} ${selDay}</h3>
      <div style="font-size:11px;color:var(--t4)">${selDateStr}</div>
    </div>
    <button class="btn bp2 bsm" id="nwEv">${I.plus} Add Event</button>
  </div>
  ${selEvts.length?selEvts.map(e=>`<div class="ev-item">
    <div class="ev-color" style="background:${e.color||'var(--p)'}"></div>
    <div style="flex:1">
      <div style="font-weight:600;font-size:13px">${esc(e.title)} ${e.type==='task'?'<span style="font-size:10px;color:var(--t3);background:rgba(96,165,250,.1);padding:1px 6px;border-radius:4px">Task</span>':''}</div>
      <div style="font-size:11px;color:var(--t3);display:flex;align-items:center;gap:4px;margin-top:2px">
        <span style="display:flex;align-items:center;gap:2px">${I.clock} ${fmtTime(e.date)}${e.endDate?' – '+fmtTime(e.endDate):''}</span>
        ${e.location?`<span style="display:flex;align-items:center;gap:2px">${I.mapPin} ${esc(e.location)}</span>`:''}
      </div>
      ${e.description?`<div style="font-size:11px;color:var(--t4);margin-top:3px">${esc(e.description)}</div>`:''}
    </div>
    ${e.type!=='task'?`<div style="display:flex;gap:3px"><button class="btn bg2 bsm" data-ee="${e.id}" style="padding:4px">${I.edit}</button><button class="btn bg2 bsm" style="color:var(--err);padding:4px" data-de="${e.id}">${I.trash}</button></div>`:''}
  </div>`).join(''):`<div style="text-align:center;padding:30px;color:var(--t4)">
    <div style="font-size:36px;margin-bottom:8px;opacity:.3">📅</div>
    <div style="font-size:13px;margin-bottom:4px">No events for this day</div>
    <div style="font-size:11px">Click <strong>+ Add Event</strong> to create one</div>
  </div>`}
  </div>`;

  // Bind events
  $('#calP').onclick=()=>{S.calM--;if(S.calM<0){S.calM=11;S.calY--}S.calSel=null;render()};
  $('#calN').onclick=()=>{S.calM++;if(S.calM>11){S.calM=0;S.calY++}S.calSel=null;render()};
  $$('[data-cd]').forEach(b=>b.onclick=()=>{S.calSel=+b.dataset.cd;render()});
  $('#nwEv').onclick=()=>openEventModal();
  $$('[data-de]').forEach(b=>b.onclick=e=>{e.stopPropagation();if(confirm('Delete event?')){DB.setEvents(S.session.id,DB.getEvents(S.session.id).filter(ev=>ev.id!==b.dataset.de));toast('Deleted');render()}});
  $$('[data-ee]').forEach(b=>b.onclick=e=>{e.stopPropagation();const ev=DB.getEvents(S.session.id).find(ev=>ev.id===b.dataset.ee);if(ev)openEventModal(ev)});
}

function openEventModal(ev=null){
  const COLORS=['#7C5CFC','#F472B6','#34D399','#FBBF24','#60A5FA','#FB7185'];
  let col=ev?.color||'#7C5CFC';
  const defDate=S.calSel?new Date(S.calY,S.calM,S.calSel,9,0):new Date();

  const old=$('.ov');if(old)old.remove();
  const ov=h('div','ov');
  ov.innerHTML=`<div class="modal"><div class="mh"><h2 style="font-size:17px;font-weight:700">${ev?'Edit':'New'} Event</h2><button class="mx" id="mx">${I.x}</button></div><div class="mb">
    <div class="fg"><label class="fl">Event Title</label><input class="fi" id="eT" placeholder="Meeting, birthday, deadline…" value="${esc(ev?.title||'')}" required></div>
    <div class="date-card">
      <div class="date-card-header">${I.cal}<span>Date & Time</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label class="fl">Start</label><input type="datetime-local" id="eD" value="${ev?.date?toLocal(ev.date):toLocal(defDate)}" style="width:100%;padding:9px 12px;background:rgba(15,20,45,.5);border:1px solid rgba(124,92,252,.1);border-radius:10px;color:var(--t1);font-size:13px;font-family:var(--f)"></div>
        <div><label class="fl">End (optional)</label><input type="datetime-local" id="eDE" value="${ev?.endDate?toLocal(ev.endDate):''}" style="width:100%;padding:9px 12px;background:rgba(15,20,45,.5);border:1px solid rgba(124,92,252,.1);border-radius:10px;color:var(--t1);font-size:13px;font-family:var(--f)"></div>
      </div>
    </div>
    <div class="fg"><label class="fl">📍 Location</label><input class="fi" id="eLoc" placeholder="Office, Zoom, Coffee shop…" value="${esc(ev?.location||'')}"></div>
    <div class="fg"><label class="fl">Description</label><textarea class="ft" id="eDs" placeholder="Event details…" rows="2" style="min-height:60px">${esc(ev?.description||'')}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fg"><label class="fl">🔁 Repeat</label><select class="fs2" id="eRp"><option value="none"${(ev?.repeat||'none')==='none'?' selected':''}>No repeat</option><option value="daily"${ev?.repeat==='daily'?' selected':''}>Daily</option><option value="weekly"${ev?.repeat==='weekly'?' selected':''}>Weekly</option><option value="monthly"${ev?.repeat==='monthly'?' selected':''}>Monthly</option><option value="yearly"${ev?.repeat==='yearly'?' selected':''}>Yearly</option></select></div>
      <div class="fg"><label class="fl">🔔 Reminder</label><select class="fs2" id="eRm"><option value="none">None</option><option value="5">5 min before</option><option value="15" selected>15 min before</option><option value="30">30 min before</option><option value="60">1 hour before</option></select></div>
    </div>
    <div><label class="fl">Color</label><div class="cpk">${COLORS.map(c=>`<div class="cdot${col===c?' on':''}" style="background:${c}" data-cl="${c}"></div>`).join('')}</div></div>
  </div><div class="mf"><button class="btn bs2" id="eCn">Cancel</button><button class="btn bp2" id="eSv">${ev?'Update':'Create'} Event</button></div></div>`;

  document.body.appendChild(ov);
  ov.onclick=e=>{if(e.target===ov)cl()};$('#mx').onclick=cl;$('#eCn').onclick=cl;
  $$('[data-cl]').forEach(d=>d.onclick=()=>{col=d.dataset.cl;$$('.cdot').forEach(x=>x.classList.remove('on'));d.classList.add('on')});
  $('#eSv').onclick=()=>{
    const t=$('#eT').value.trim();if(!t){toast('Title required','err');return}
    const es=DB.getEvents(S.session.id);
    const data={title:t,date:$('#eD').value?new Date($('#eD').value).toISOString():new Date().toISOString(),endDate:$('#eDE').value?new Date($('#eDE').value).toISOString():null,location:$('#eLoc').value.trim(),description:$('#eDs').value,repeat:$('#eRp').value,reminderMin:$('#eRm').value,color:col};
    if(ev){const i=es.findIndex(e=>e.id===ev.id);if(i>=0){es[i]={...es[i],...data};toast('Updated ✅')}}
    else{es.push({...data,id:uid(),createdAt:new Date().toISOString()});toast('Event created 📅')}
    DB.setEvents(S.session.id,es);cl();render();
  };
  function cl(){const o=$('.ov');if(o)o.remove()}
  setTimeout(()=>$('#eT')?.focus(),100);
}

// ═══ SETTINGS ═══
function settingsPage(ct){
  const perm='Notification'in window?Notification.permission:'unsupported';
  ct.innerHTML=`<div class="fIn" style="max-width:620px"><div class="tabs"><button class="tab${S.st==='profile'?' on':''}" data-st="profile">${I.user} Profile</button><button class="tab${S.st==='notifications'?' on':''}" data-st="notifications">${I.bell} Notifications</button><button class="tab${S.st==='about'?' on':''}" data-st="about">${I.info} About</button></div><div id="stC"></div></div>`;
  $$('[data-st]').forEach(b=>b.onclick=()=>{S.st=b.dataset.st;render()});const sc=$('#stC');
  if(S.st==='profile'){sc.innerHTML=`<div class="glass2" style="padding:22px;border-radius:16px"><h3 style="font-size:16px;font-weight:700;margin-bottom:20px">Profile</h3><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div class="av" style="width:56px;height:56px;font-size:22px;border-radius:16px">${S.session.name[0].toUpperCase()}</div><div><div style="font-size:17px;font-weight:700">${esc(S.session.name)}</div><div style="font-size:12.5px;color:var(--t4)">${esc(S.session.email)}</div></div></div><div class="fg"><label class="fl">Display Name</label><input class="fi" id="sN" value="${esc(S.session.name)}"></div><button class="btn bp2" id="sS">Save</button></div>`;
    $('#sS').onclick=()=>{const n=$('#sN').value.trim();if(n){S.session.name=n;DB.setSession(S.session);const users=DB.getUsers();const u=users.find(x=>x.id===S.session.id);if(u){u.name=n;DB.saveUsers(users)}toast('Saved ✅');render()}}}
  else if(S.st==='notifications'){
    const notifSupported='Notification' in window;
    sc.innerHTML=`<div class="glass2" style="padding:22px;border-radius:16px"><h3 style="font-size:16px;font-weight:700;margin-bottom:20px">Notifications</h3>

    <!-- Permission Card -->
    <div style="background:${perm==='granted'?'rgba(52,211,153,.04)':'rgba(124,92,252,.04)'};border:1px solid ${perm==='granted'?'rgba(52,211,153,.15)':'rgba(124,92,252,.1)'};border-radius:var(--r);padding:16px;margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:700;margin-bottom:3px;font-size:14px;display:flex;align-items:center;gap:6px">${I.shield} Device Notifications</div>
          <div style="font-size:12px;color:var(--t4);line-height:1.5">
            ${!notifSupported?'Your browser does not support notifications.':
              perm==='granted'?'<span style="color:var(--ok)">✅ Active — You\'ll receive alerts for reminders, overdue & upcoming tasks</span>':
              perm==='denied'?'<span style="color:var(--err)">❌ Blocked — Please enable in your browser settings:<br>• Chrome: Click 🔒 in address bar → Site settings → Notifications → Allow<br>• Safari: Settings → Notifications → Allow<br>• Android: Tap 🔒 → Permissions → Notifications</span>':
              '<span style="color:var(--w)">⏳ Not enabled yet — Tap the button to allow notifications</span>'}
          </div>
        </div>
        ${perm==='default'&&notifSupported?`<button class="btn bp2 bsm" id="sEP" style="flex-shrink:0">Enable Now</button>`:''}
        ${perm==='granted'?`<button class="btn bp2 bsm" id="sTest" style="flex-shrink:0;background:linear-gradient(135deg,var(--ok),#10B981)">Test 🔔</button>`:''}
      </div>
    </div>

    <!-- What you'll get -->
    <div style="margin-bottom:18px">
      <div style="font-weight:600;font-size:13.5px;margin-bottom:10px">What you'll be notified about:</div>
      ${[
        ['🔔','Reminders','When your set reminder time arrives'],
        ['⏰','15-min warning','15 minutes before a task is due'],
        ['⚠️','Overdue tasks','Instantly when a task passes its due date'],
        ['🔁','Recurring','Daily, weekly, or monthly recurring reminders'],
        ['🔊','Sound alert','A notification chime plays with each alert']
      ].map(([ic,t,d])=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--b)"><span style="font-size:16px;flex-shrink:0;margin-top:1px">${ic}</span><div><div style="font-weight:600;font-size:13px">${t}</div><div style="font-size:11.5px;color:var(--t4)">${d}</div></div></div>`).join('')}
    </div>

    <!-- How to set a reminder -->
    <div style="background:var(--glass3);border-radius:var(--r);padding:14px;border:1px solid var(--b)">
      <div style="font-weight:600;font-size:13px;margin-bottom:6px">💡 How to set a reminder:</div>
      <ol style="font-size:12px;color:var(--t3);padding-left:18px;line-height:1.7">
        <li>Create or edit a task</li>
        <li>Toggle the <span style="color:var(--pl);font-weight:600">🔔 Reminder</span> switch ON</li>
        <li>Set the date & time you want to be reminded</li>
        <li>Optionally set it to repeat daily/weekly/monthly</li>
        <li>Save — you'll get a device notification at that exact time!</li>
      </ol>
    </div>
    </div>`;

    const ep=$('#sEP');if(ep)ep.onclick=async()=>{
      if('Notification'in window){
        const p=await Notification.requestPermission();
        if(p==='granted'){
          toast('Notifications enabled! 🔔');
          sendDeviceNotif('Shepino Tasks','Notifications are now active! You\'ll never miss a task.','test');
        }else{
          toast('Notifications blocked — check browser settings','err');
        }
        render();
      }
    };
    const testBtn=$('#sTest');if(testBtn)testBtn.onclick=()=>{
      sendDeviceNotif('🔔 Test Notification','This is a test from Shepino Tasks — notifications are working!','test-'+Date.now());
      toast('Test notification sent!');
    };
  }
  else{sc.innerHTML=`<div class="glass2" style="padding:28px;text-align:center;border-radius:16px"><div class="logo" style="width:52px;height:52px;font-size:26px;margin:0 auto 14px;border-radius:16px">S</div><h2 style="font-size:24px;font-weight:800;margin-bottom:5px;background:linear-gradient(135deg,var(--pl),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Shepino Tasks</h2><p style="color:var(--t4);margin-bottom:3px;font-size:13px">Version 2.0 — Premium Edition</p><p style="color:var(--t2);font-size:13.5px;max-width:360px;margin:10px auto;line-height:1.6">Your personal task manager and second brain. Organize tasks, capture ideas, set reminders, and never miss a deadline.</p></div>`}
}

// ═══ NOTIF PANEL ═══
function notifPanel(od,up){return`<div class="np"><div style="padding:18px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between"><h3 style="display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700">${I.bell} Notifications</h3><button class="mx" id="npClose">${I.x}</button></div><div style="flex:1;overflow-y:auto;padding:10px">
${od.length?`<div style="padding:10px 6px 5px;font-size:10.5px;font-weight:700;color:var(--err);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:4px">${I.warn} Overdue (${od.length})</div>${od.map(t=>`<div class="npi od" data-npg="${t.id}"><div style="font-weight:600;font-size:13.5px;margin-bottom:2px">${esc(t.title)}</div><div style="font-size:11.5px;color:var(--err);display:flex;align-items:center;gap:3px">${I.clock} Due ${timeAgo(t.dueDate)}</div></div>`).join('')}`:''}
${up.length?`<div style="padding:10px 6px 5px;font-size:10.5px;font-weight:700;color:var(--w);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:4px">${I.clock} Upcoming (${up.length})</div>${up.map(t=>`<div class="npi up" data-npg="${t.id}"><div style="font-weight:600;font-size:13.5px;margin-bottom:2px">${esc(t.title)}</div><div style="font-size:11.5px;color:var(--t4);display:flex;align-items:center;gap:3px">${I.clock} ${t.dueDate?fmtDate(t.dueDate)+' '+fmtTime(t.dueDate):'Soon'}</div></div>`).join('')}`:''}
${!od.length&&!up.length?'<div style="text-align:center;padding:36px;color:var(--t4)"><div style="font-size:40px;margin-bottom:8px">🎉</div><h4 style="font-weight:700;color:var(--t2)">All caught up!</h4><p style="font-size:12.5px;margin-top:3px">No pending notifications.</p></div>':''}
</div></div>`}

// ═══ BOOT ═══
render();
</script>
